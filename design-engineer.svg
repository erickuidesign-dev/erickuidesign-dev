<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%">
  <defs>
    <!-- Gradiente de cores -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BED20A" />
      <stop offset="100%" stop-color="#1286C3" />
    </linearGradient>
    
    <style>
      .bg { fill: #0d0e15; rx: 12px; }
      .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; fill: url(#grad); font-size: 24px; letter-spacing: 2px; }
      .subtitle { font-family: 'Fira Code', monospace; fill: #717b99; font-size: 14px; }
      
      /* Animação do fluxo de dados */
      .connection-line {
        stroke: url(#grad);
        stroke-dasharray: 6, 6;
        animation: flow 20s linear infinite;
      }
      
      /* Pulsação nos círculos das pontas */
      .glow-pulse {
        animation: pulse 3s ease-in-out infinite alternate;
      }

      @keyframes flow {
        to {
          stroke-dashoffset: -500;
        }
      }

      @keyframes pulse {
        0% { opacity: 0.3; r: 30px; }
        100% { opacity: 0.8; r: 35px; }
      }
    </style>
  </defs>

  <!-- Fundo escuro -->
  <rect class="bg" width="100%" height="100%" />

  <!-- Título principal -->
  <text x="50%" y="60" text-anchor="middle" class="title">DESIGN ENGINEERING</text>
  <text x="50%" y="85" text-anchor="middle" class="subtitle">bridging the gap between design and code</text>

  <!-- Linha de conexão animada -->
  <line x1="200" y1="180" x2="600" y2="180" stroke-width="3" class="connection-line" />

  <!-- Brilho pulsante (Design) -->
  <circle cx="200" cy="180" r="30" fill="#BED20A" opacity="0.5" class="glow-pulse" />
  
  <!-- Círculo principal (Design) -->
  <circle cx="200" cy="180" r="28" fill="#BED20A" />
  <text x="200" y="184" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#000">DESIGN</text>
  <text x="200" y="235" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#BED20A" font-weight="bold">Photoshop | Figma</text>

  <!-- Elemento Central (Erick) -->
  <g transform="translate(400, 180)">
    <circle r="40" fill="#1e1e28" stroke="url(#grad)" stroke-width="2" />
    <text y="4" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="900" font-size="11" fill="#fff">ERICK</text>
  </g>

  <!-- Brilho pulsante (Code) -->
  <circle cx="600" cy="180" r="30" fill="#1286C3" opacity="0.5" class="glow-pulse" />

  <!-- Círculo principal (Code) -->
  <circle cx="600" cy="180" r="28" fill="#1286C3" />
  <text x="600" y="184" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#fff">CODE</text>
  <text x="600" y="235" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#1286C3" font-weight="bold">Astro | Python</text>
</svg>
